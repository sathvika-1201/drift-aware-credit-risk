version: "3.9"

services:
  api:
    build: .
    container_name: credit-risk-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build: .
    container_name: credit-risk-dashboard
    command: streamlit run dashboard/app.py --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app

  mlflow:
    build: .
    container_name: credit-risk-mlflow
    command: mlflow ui --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - .:/app